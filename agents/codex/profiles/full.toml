# Codex full profile — DANGER MODE
# Full MCP inventory + unrestricted execution.
# Only use this on trusted machines where you accept the risk.
# Switch: ~/.codex/profiles/switch.ps1 full

model_provider = "openai"
model = "o3"
model_reasoning_effort = "high"
personality = "pragmatic"

# WARNING: these settings bypass all safety prompts
approval_policy = "never"
sandbox_mode = "danger-full-access"
auto_approve = true
dangerously_bypass_approvals = true

[windows]
sandbox = "elevated"

[mcp_servers.github]
enabled = true
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github@2025.4.8"]
startup_timeout_sec = 30
env_vars = ["GITHUB_PERSONAL_ACCESS_TOKEN"]

[mcp_servers.memory]
enabled = true
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory@2026.1.26"]
startup_timeout_sec = 30

[mcp_servers.web-reader]
enabled = true
url = "https://api.z.ai/api/mcp/web_reader/mcp"
bearer_token_env_var = "Z_AI_API_KEY"

[mcp_servers.zai-mcp-server]
enabled = true
command = "npx"
args = ["-y", "@z_ai/mcp-server@0.1.3"]
startup_timeout_sec = 30
env_vars = ["Z_AI_API_KEY"]

[mcp_servers.zai-mcp-server.env]
Z_AI_MODE = "ZAI"

[mcp_servers.context7]
enabled = true
command = "npx"
args = ["-y", "@upstash/context7-mcp@2.1.4"]
startup_timeout_sec = 30

[mcp_servers.firecrawl]
enabled = false
command = "npx"
args = ["-y", "firecrawl-mcp@3.11.0"]
startup_timeout_sec = 30
env_vars = ["FIRECRAWL_API_KEY"]

[mcp_servers.sequential-thinking]
enabled = true
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking@2025.12.18"]
startup_timeout_sec = 30

[mcp_servers.vercel]
enabled = true
url = "https://mcp.vercel.com"

[mcp_servers.railway]
enabled = true
command = "npx"
args = ["-y", "@railway/mcp-server@0.1.8"]
startup_timeout_sec = 30

[mcp_servers.cloudflare-docs]
enabled = true
url = "https://docs.mcp.cloudflare.com/mcp"

[mcp_servers.cloudflare-workers-builds]
enabled = true
url = "https://builds.mcp.cloudflare.com/mcp"

[mcp_servers.cloudflare-workers-bindings]
enabled = true
url = "https://bindings.mcp.cloudflare.com/mcp"

[mcp_servers.cloudflare-observability]
enabled = true
url = "https://observability.mcp.cloudflare.com/mcp"

[mcp_servers.playwright]
enabled = true
command = "npx"
args = ["-y", "@executeautomation/playwright-mcp-server@1.0.12"]
startup_timeout_sec = 30

[mcp_servers.supabase]
enabled = true
url = "https://mcp.supabase.com/mcp?project_ref=${env:SUPABASE_PROJECT_REF}"
bearer_token_env_var = "SUPABASE_ACCESS_TOKEN"

[mcp_servers.magic]
enabled = true
command = "npx"
args = ["-y", "@magicuidesign/mcp@2.0.0"]
startup_timeout_sec = 30

[mcp_servers.expo-mcp]
enabled = true
url = "https://mcp.expo.dev/mcp"
bearer_token_env_var = "EXPO_TOKEN"

[mcp_servers.brave-search]
enabled = true
command = "npx"
args = ["-y", "@modelcontextprotocol/server-brave-search@0.6.2"]
startup_timeout_sec = 30
env_vars = ["BRAVE_API_KEY"]
