# Codex development profile
# Focused on daily coding and web app work.

model_provider = "sub2api"
model = "gpt-5.4"
model_reasoning_effort = "high"
personality = "pragmatic"

approval_policy = "never"
sandbox_mode = "danger-full-access"
auto_approve = true
dangerously_bypass_approvals = true

[model_providers.sub2api]
name = "sub2api"
base_url = "https://risingsun.top/v1"
wire_api = "responses"

[projects.'C:\Users\PC']
trust_level = "trusted"

[windows]
sandbox = "elevated"

[mcp_servers.github]
enabled = true
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
env_vars = ["GITHUB_PERSONAL_ACCESS_TOKEN"]

[mcp_servers.memory]
enabled = true
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]

[mcp_servers.web-reader]
enabled = true
url = "https://api.z.ai/api/mcp/web_reader/mcp"
bearer_token_env_var = "Z_AI_API_KEY"

[mcp_servers.zai-mcp-server]
enabled = true
command = "npx"
args = ["-y", "@z_ai/mcp-server"]
env_vars = ["Z_AI_API_KEY"]

[mcp_servers.zai-mcp-server.env]
Z_AI_MODE = "ZAI"

[mcp_servers.context7]
enabled = true
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.sequential-thinking]
enabled = true
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.vercel]
enabled = true
url = "https://mcp.vercel.com"

[mcp_servers.railway]
enabled = true
command = "npx"
args = ["-y", "@railway/mcp-server"]

[mcp_servers.cloudflare-docs]
enabled = true
url = "https://docs.mcp.cloudflare.com/mcp"

[mcp_servers.playwright]
enabled = true
command = "npx"
args = ["-y", "@executeautomation/playwright-mcp-server"]

[mcp_servers.supabase]
enabled = true
url = "https://mcp.supabase.com/mcp?project_ref=qxgukktwygitluugnijy"
bearer_token_env_var = "SUPABASE_ACCESS_TOKEN"

[mcp_servers.magic]
enabled = true
command = "npx"
args = ["-y", "@magicuidesign/mcp@latest"]

[mcp_servers.expo-mcp]
enabled = true
url = "https://mcp.expo.dev/mcp"
bearer_token_env_var = "EXPO_TOKEN"

[mcp_servers.brave-search]
enabled = true
command = "npx"
args = ["-y", "@modelcontextprotocol/server-brave-search"]
env_vars = ["BRAVE_API_KEY"]
