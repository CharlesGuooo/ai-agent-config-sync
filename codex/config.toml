# Codex 配置
# Updated: 2026-03-21

################################################################################
# Core Model Selection
################################################################################

model_provider = "openai"
model = "o3"
model_reasoning_effort = "medium"
personality = "pragmatic"

################################################################################
# Approval & Sandbox
################################################################################

approval_policy = "never"
sandbox_mode = "danger-full-access"
auto_approve = true
dangerously_bypass_approvals = true

################################################################################
# Model Providers
################################################################################

[model_providers.openai]
name = "openai"
base_url = "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
wire_api = "responses"

################################################################################
# Windows Settings
################################################################################

[windows]
sandbox = "elevated"

################################################################################
# MCP Servers (17个)
# 核心: memory, filesystem, github, brave-search, chroma, context7
# 可选: sequential-thinking, vercel, railway, cloudflare-*, playwright, supabase, magic, expo-mcp
################################################################################

# === 核心 MCP ===

[mcp_servers.memory]
enabled = true
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]

[mcp_servers.filesystem]
enabled = true
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "${HOME}"]

[mcp_servers.github]
enabled = true
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
env_vars = ["GITHUB_PERSONAL_ACCESS_TOKEN"]

[mcp_servers.brave-search]
enabled = true
command = "npx"
args = ["-y", "@modelcontextprotocol/server-brave-search"]
env_vars = ["BRAVE_API_KEY"]

[mcp_servers.chroma]
enabled = true
command = "npx"
args = ["-y", "@chroma-core/chroma-mcp"]

[mcp_servers.context7]
enabled = true
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

# === 可选 MCP ===

[mcp_servers.sequential-thinking]
enabled = true
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.vercel]
enabled = true
url = "https://mcp.vercel.com"

[mcp_servers.railway]
enabled = true
command = "npx"
args = ["-y", "@railway/mcp-server"]

[mcp_servers.cloudflare-docs]
enabled = true
url = "https://docs.mcp.cloudflare.com/mcp"

[mcp_servers.cloudflare-workers-builds]
enabled = true
url = "https://builds.mcp.cloudflare.com/mcp"

[mcp_servers.cloudflare-workers-bindings]
enabled = true
url = "https://bindings.mcp.cloudflare.com/mcp"

[mcp_servers.cloudflare-observability]
enabled = true
url = "https://observability.mcp.cloudflare.com/mcp"

[mcp_servers.playwright]
enabled = true
command = "npx"
args = ["-y", "@executeautomation/playwright-mcp-server"]

[mcp_servers.supabase]
enabled = true
command = "npx"
args = ["-y", "@supabase/mcp-server-supabase@latest"]
env_vars = ["SUPABASE_ACCESS_TOKEN"]

[mcp_servers.magic]
enabled = true
command = "npx"
args = ["-y", "@magicuidesign/mcp@latest"]

[mcp_servers.expo-mcp]
enabled = true
url = "https://mcp.expo.dev/mcp"
